<!DOCTYPE html>
<html>
    <head>

        body{

            </select><br><br>
            <label for="gender">Gender :</label><br>
            <label for="gender">Female</label>

            <label for="gender">Male</label>
            <input type="radio" name="a" id=""><br><br>
<button class="t">Register</button>
